                <h3>Top Gear 2 <br> Super Nintendo </h3>
                <p><strong>Desenvolvedora:</strong> Gremlin Interactive <br>
                    <strong>Editora:</strong> Kemco <br>
                    <strong>Lançamento:</strong> 1993 <br>
                    <strong>Gênero:</strong> Corrida <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer (Split-screen) <br>
                </p>
                <div class="game-description">
                    <p>A sequência do lendário clássico de corrida do SNES. Enquanto o primeiro jogo focava em
                        velocidade pura, <em>Top Gear 2</em> introduziu elementos de RPG e estratégia, obrigando o
                        jogador a gerenciar dinheiro e melhorar o carro para vencer em pistas cada vez mais complexas.
                    </p>

                    <h4>📜 O Campeonato</h4>
                    <p>O escopo do jogo é global e massivo. Você deve disputar corridas em <strong>64 pistas</strong>
                        espalhadas por <strong>16 países</strong> diferentes, começando na Australásia e passando por
                        locais como Grã-Bretanha, Egito e Estados Unidos, buscando o título de campeão mundial.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Sistema de Upgrades:</strong> A maior inovação. Com o dinheiro dos prêmios, você
                            deve comprar melhorias na loja: motores mais potentes, pneus de melhor aderência, caixas de
                            câmbio e blindagem.</li>
                        <li><strong>Dano e Combustível:</strong> Diferente do primeiro, aqui seu carro tem uma barra de
                            saúde. Bater nos rivais ou obstáculos danifica o veículo e reduz sua velocidade máxima,
                            adicionando uma camada de cautela.</li>
                        <li><strong>Clima Dinâmico:</strong> O jogo introduziu efeitos climáticos que afetam a
                            jogabilidade, como chuva (que diminui a aderência) e neblina noturna (que reduz
                            drasticamente a visibilidade).</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O desafio de completar as 64 pistas exige paciência e estratégia na compra das peças certas para
                        cada tipo de terreno. O clássico sistema de <em>Passwords</em> longos e complexos é a marca
                        registrada para quem tentava zerar isso nos anos 90.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
