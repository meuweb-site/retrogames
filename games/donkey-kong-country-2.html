                <h3>Donkey Kong Country 2: Diddy's Kong Quest <br> Super Nintendo </h3>
                <p><strong>Desenvolvedora:</strong> Rare <br>
                    <strong>Editora:</strong> Nintendo <br>
                    <strong>Lançamento:</strong> 1995 <br>
                    <strong>Gênero:</strong> Plataforma <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer <br>
                </p>
                <div class="game-description">
                    <p>Frequentemente citado como o auge da trilogia no SNES e um dos melhores jogos de plataforma de
                        todos os tempos. A Rare refinou a fórmula do original com level design mais complexo, gráficos
                        pré-renderizados ainda mais bonitos e uma atmosfera pirata inesquecível.
                    </p>

                    <h4>📜 A História</h4>
                    <p>Desta vez, <strong>Donkey Kong foi sequestrado</strong> pelo Kaptain K. Rool, que exige o estoque
                        de bananas da família como resgate. Diddy Kong se une à sua namorada, <strong>Dixie
                            Kong</strong>, e parte para a perigosa <em>Crocodile Isle</em> para resgatar seu tio.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Dixie Kong & Habilidade de Planar:</strong> A introdução de Dixie permitiu usar seu
                            cabelo como hélice para planar, facilitando a precisão nos pulos.</li>
                        <li><strong>Team-Up:</strong> A mecânica de arremessar o parceiro para alcançar áreas altas ou
                            derrotar inimigos adicionou profundidade à exploração.</li>
                        <li><strong>Trilha Sonora Lendária:</strong> Composta por David Wise, a música (especialmente
                            "Stickerbush Symphony") é considerada uma obra-prima dos 16-bits.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O jogo é brutal e recompensador para completistas. É necessário encontrar as
                        <strong>Kremkoins</strong> nas fases bônus para pagar o pedágio do Klubba e acessar o "Lost
                        World", uma área secreta com as fases mais difíceis e o verdadeiro final do jogo.
                    </p>
                </div>

                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
