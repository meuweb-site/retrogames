                <h2>Sobre o Jogo</h2>
                <p> Este é um dos jogos de luta mais icônicos e revolucionários de todos os
                    tempos: Tekken 3 para a PlayStation original. Lançado em 1998 para consoles, após um sucesso
                    estrondoso nos arcades, este título da Namco não foi apenas mais um jogo na biblioteca do PS1; ele
                    redefiniu o gênero de luta 3D e se tornou um clássico instantâneo, aclamado por crítica e jogadores.
                <h3>Por Que Tekken 3 é um Clássico?</h3>
                Passados dezenove anos após os eventos de Tekken 2, o jogo apresenta uma trama envolvente centrada
                em uma nova geração de lutadores, introduzindo personagens que se tornariam pilares da série, como o
                protagonista Jin Kazama, além de Ling Xiaoyu, Hwoarang e Bryan Fury. A história gira em torno do
                despertar de uma força maligna ancestral, Ogre, e o torneio Punho de Ferro que busca enfrentá-la.
                O que realmente solidificou o status de lenda de Tekken 3 foram suas inovações de jogabilidade:

                <p>Jogabilidade Fluida e 3D: O jogo aprimorou significativamente o movimento em três eixos (3D),
                    permitindo que os jogadores desviassem para os lados com toques rápidos, adicionando uma camada
                    estratégica inédita aos combates.</p>
                <p> Gráficos Excepcionais: Tekken 3 ultrapassou os limites do hardware do PlayStation, apresentando
                    gráficos detalhados, animações fluidas e visuais que impressionavam na época. </p>
                <p> Modos de Jogo Variados: Além do tradicional Modo Arcade, a versão para console introduziu modos
                    bônus adorados, como o envolvente modo beat 'em up Tekken Force e o divertido Tekken Ball (uma
                    espécie de vôlei mortal). </p>
                <p> Elenco Marcante: Com 23 personagens no total, incluindo muitos estreantes e veteranos, cada lutador
                    tinha um estilo de combate único e combos fáceis de aprender, mas difíceis de dominar. </p>
                Tekken 3 vendeu mais de 8 milhões de cópias, tornando-se um dos jogos mais vendidos do console e um
                marco na história dos games de luta. Sua mecânica de combate balanceada e seu conteúdo secreto
                garantem que, mesmo décadas depois, ele continue sendo um título incrivelmente divertido e
                desafiador. </p>

                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
