            <div id="gameInfo">
                <img src="../assets/images/mercs.webp" alt="Capa do Jogo Mercs" class="game-cover">

                <h3>Mercs <br> Arcade / Mega Drive</h3>
                <p><strong>Desenvolvedora:</strong> Capcom <br>
                    <strong>Editora:</strong> Capcom <br>
                    <strong>Lançamento:</strong> 1990 <br>
                    <strong>Gênero:</strong> Run and Gun (Top-down) <br>
                    <strong>Modos de Jogo:</strong> Single-player, Co-op (até 3 jogadores) <br>
                </p>
                <div class="game-description">
                    <p>A sequência direta do lendário <em>Commando</em>. Utilizando a poderosa placa CPS-1 (a mesma de
                        Street Fighter II), a Capcom entregou um shooter de vista aérea com sprites gigantes, gráficos
                        detalhados e uma ação cooperativa que definiu as tardes nos fliperamas.
                    </p>

                    <h4>📜 A História</h4>
                    <p>Um grupo revolucionário sequestrou o ex-presidente dos Estados Unidos durante uma visita
                        diplomática ao país fictício de Zutula, na África Central. Para evitar um incidente
                        internacional oficial, o governo contrata secretamente a <strong>Wolf Force</strong>, um
                        esquadrão de elite de mercenários anti-terrorismo, para realizar o resgate.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Três Soldados Distintos:</strong> No Arcade, três jogadores podiam jogar juntos,
                            cada um com uma arma específica (Rifle, Lança-Granadas ou Escopeta), exigindo trabalho em
                            equipe.</li>
                        <li><strong>Mega Crash:</strong> O ataque especial que destrói todos os inimigos da tela, mas
                            consome um pedaço da sua barra de vida. Um recurso tático de alto risco.</li>
                        <li><strong>Veículos:</strong> Uma das grandes novidades foi a possibilidade de sequestrar jipes
                            e tanques inimigos para atropelar oponentes e usar poder de fogo pesado.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>Além do desafio arcade clássico, vale destacar que a conversão para <strong>Mega Drive</strong>
                        possui um "Original Mode" exclusivo. Esse modo funciona quase como um RPG, onde você recruta
                        soldados, compra upgrades de armas e joga missões totalmente novas, sendo considerado por muitos
                        até melhor que o Arcade.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
