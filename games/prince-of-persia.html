                <h3>Prince of Persia <br> Master System </h3>
                <p> A versão de Prince of Persia para o console Master System, da SEGA, foi lançada em 1992 (com alguns
                    registros de lançamento no Brasil pela TecToy em 1993). O jogo original, que revolucionou a animação
                    em games com sua técnica de rotoscopia, foi concebido por Jordan Mechner em 1989 para o Apple II e
                    publicado pela Brøderbund.

                    A adaptação para o Master System foi desenvolvida pela equipe The Kremlin e publicada pela Domark.
                    Ela manteve a jogabilidade central de plataforma e aventura, desafiando o jogador a correr contra o
                    tempo para resgatar a Princesa das garras do Grão-Vizir Jaffar, superando armadilhas mortais e
                    guardas em um castelo persa. Esta versão é frequentemente lembrada por manter a atmosfera sombria e
                    a precisão dos movimentos do protagonista, características que definiram a franquia.</p>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
