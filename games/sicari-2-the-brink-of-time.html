                <h2>Sobre o Jogo</h2>
                <p>Criado em 2022 tendo como base o jogo Super Mario World, Sicari 2 transforma completamente a
                    experiência original do Super Nintendo. O jogo deixa o Mario de lado para apresentar a Sicari, uma
                    protagonista que usa um bumerangue para tudo. É uma modificação impressionante que muda os gráficos,
                    as músicas e os inimigos, parecendo um jogo totalmente novo feito do zero, e não apenas uma versão
                    alterada do clássico.

                    A diversão principal está em aprender a usar o bumerangue, que serve tanto para atacar quanto para
                    pegar itens distantes. O jogo é perfeito para quem gosta de aventuras de plataforma estilo anos 90,
                    mas quer algo inédito para jogar. Ele traz fases criativas e muito bonitas, oferecendo um desafio
                    justo e divertido sem ser complicado demais para entender. </p>
                <br>
                <h2>Como Salvar</h2>

                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
