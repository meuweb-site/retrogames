        <div class="game-container">

            <div id="gameFrame">
                <iframe
                    src="https://www.retrogames.cc/embed/45176-harry-potter-and-the-chamber-of-secrets-usa-en-fr-es.html"

                    <p>💡 Para jogar em tela cheia, clique no ícone de configurações "↓" no centro do emulador e então "Enter Full Screen"</p>

            <div id="gameInfo">
                <img src="../assets/images/hp-chamber.webp" alt="Capa do Jogo Harry Potter and the Chamber of Secrets"
                    class="game-cover">
                <h3>Harry Potter and the Chamber of Secrets <br> PlayStation</h3>
                <p><strong>Desenvolvedora:</strong> Argonaut Games <br>
                    <strong>Editora:</strong> Electronic Arts (EA) <br>
                    <strong>Lançamento:</strong> 2002 <br>
                    <strong>Gênero:</strong> Ação / Aventura <br>
                    <strong>Modos de Jogo:</strong> Single-player <br>
                </p>
                <div class="game-description">
                    <p>A sequência mágica que definiu a infância de muitos. Com um mundo aberto surpreendente para a
                        época, o jogo
                        convida você a explorar cada canto de Hogwarts, coletar feijõezinhos e descobrir segredos, tudo
                        isso com o
                        charme inconfundível dos gráficos da era 32-bits.
                    </p>
                    <h4>📜 A História</h4>
                    <p>Harry ignora o aviso do elfo doméstico Dobby e retorna a Hogwarts para seu segundo ano. Porém, a
                        escola é
                        assombrada por ataques misteriosos que petrificam os alunos. Entre aulas e duelos, você deve
                        desvendar o mistério
                        do <strong>Herdeiro da Sonserina</strong> antes que a escola feche para sempre.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>O Lendário "Flipendo":</strong> Domine o feitiço mais icônico da franquia nos jogos,
                            usado para
                            empurrar objetos, ativar botões e atordoar inimigos.</li>
                        <li><strong>Exploração e Colecionáveis:</strong> O foco está em encontrar áreas secretas,
                            coletar os
                            Feijõezinhos de Todos os Sabores e completar o álbum de Cartas de Bruxos Famosos.</li>
                        <li><strong>Mini-Games:</strong> Inclui o clássico "Arremesso de Gnomos" na Toca dos Weasley e
                            desafios de voo
                            com a vassoura.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O jogo incentiva o retorno às áreas anteriores após aprender novos feitiços (como <em>Skurge</em>
                        ou
                        <em>Diffindo</em>) para acessar salas trancadas e obter as raras Cartas de Prata e Ouro,
                        essenciais para
                        o 100%.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
