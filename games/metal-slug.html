    <template id="page-main-template">

        <div class="game-container">

            <div class="game-frame" id="gameFrame">
                <iframe src="https://www.retrogames.cc/embed/9157-metal-slug-super-vehicle-001.html" width="800"
                    height="650" frameborder="no" allowfullscreen="true" webkitallowfullscreen="true"
                                        mozallowfullscreen="true" scrolling="no"></iframe>
                <div class="gameFullscreenInfo">
                    <p>💡 Para jogar em tela cheia, clique no ícone de configurações "↓" no centro do emulador e então "Enter Full Screen"</p>
                </div>
            </div>

            <div id="gameInfo">
                <h3>Metal Slug: Super Vehicle-001 <br> Arcade / Neo Geo</h3>
                <p><strong>Desenvolvedora:</strong> Nazca Corporation <br>
                    <strong>Editora:</strong> SNK <br>
                    <strong>Lançamento:</strong> 1996 <br>
                    <strong>Gênero:</strong> Run and Gun (Ação) <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer Co-op <br>
                </p>
                <div class="game-description">
                    <p>O início de uma lenda. Conhecido por sua pixel art incrivelmente detalhada, humor escrachado e
                        ação
                        frenética, este título definiu o padrão ouro para jogos de tiro 2D nos fliperamas.</p>

                    <h4>📜 A História</h4>
                    <p>No ano de 2028, o General Morden lidera um golpe de estado com seu Exército Rebelde. Você
                        controla
                        os soldados Marco Rossi e Tarma Roving, do Esquadrão Falcão Peregrino, com a missão de destruir
                        as
                        forças de Morden e recuperar o protótipo do tanque avançado "Metal Slug".</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Super Vehicle-001:</strong> A capacidade de pilotar o tanque Metal Slug mudou a
                            dinâmica
                            do gênero, oferecendo poder de fogo massivo e proteção.</li>
                        <li><strong>Heavy Machine Gun:</strong> A variedade de armas e a voz icônica do narrador ao
                            pegar
                            power-ups são marcas registradas da série.</li>
                        <li><strong>Arte e Animação:</strong> Cenários destrutíveis e inimigos que expressam medo e
                            surpresa trazem uma personalidade única ao caos.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>Além da dificuldade brutal típica de arcade que exige domínio total, o jogo incentiva o replay
                        para
                        salvar todos os Prisioneiros de Guerra (POWs) escondidos, que garantem pontuações mais altas.
                    </p>
                </div>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
