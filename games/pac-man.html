                <h2>Sobre o Jogo</h2>
                <p>Uma verdadeira lenda dos fliperamas, o Pac-Man (Namco, 1980) revolucionou a indústria e transcendeu o
                    mundo dos games, tornando-se um ícone cultural. Criado por Tōru Iwatani com o objetivo de atrair um
                    público mais amplo (incluindo mulheres), sua jogabilidade é simples e infinitamente viciante: guie o
                    carismático "Come-Come" por um labirinto, devorando pontos e fugindo dos quatro fantasmas coloridos
                    (Blinky, Pinky, Inky e Clyde). O jogo foi pioneiro ao introduzir o conceito de power-up (a pílula
                    que inverte a caçada), garantindo a ele o título de jogo de arcade mais lucrativo de todos os
                    tempos.</p>
                <h2>Como Salvar</h2>

                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
