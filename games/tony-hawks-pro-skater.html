                <h3>Tony Hawk's Pro Skater <br> Playstation </h3>
                <p> Este foi o jogo que iniciou a febre mundial do skate nos videogames. Desenvolvido pela Neversoft,
                    Tony Hawk's Pro Skater (THPS) revolucionou o gênero ao trocar a jogabilidade lenta e simulada de
                    jogos anteriores por um estilo arcade, rápido e focado em combos insanos. Com controles responsivos
                    e gráficos 3D impressionantes para a época, o jogador podia controlar lendas reais do esporte em
                    pistas icônicas como o Warehouse e School.

                    Dados Interessantes:

                    Lançado em 1999.

                    Trilha Sonora Lendária: O jogo eternizou a banda Goldfinger com a música "Superman", que se tornou o
                    hino não oficial da franquia.

                    Mudança de Nome: Na Europa, o jogo foi lançado como Tony Hawk's Skateboarding porque a palavra
                    "Skater" poderia ser confundida com patinação no gelo em alguns países.

                    Personagens Secretos: Além dos skatistas profissionais, era possível desbloquear o "Officer Dick"
                    (um policial) e o "Private Carrera".</p>

                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
