                <img src="../assets/images/final-fight-arcade.webp" alt="Capa do Jogo Final Fight" class="game-cover">
                <h3>Final Fight <br> Arcade (CP System) </h3>
                <p><strong>Desenvolvedora:</strong> Capcom <br>
                    <strong>Editora:</strong> Capcom <br>
                    <strong>Lançamento:</strong> 1989 <br>
                    <strong>Gênero:</strong> Beat 'em up (Briga de Rua) <br>
                    <strong>Modos de Jogo:</strong> Single-player, Co-op (2 Jogadores) <br>
                </p>
                <div class="game-description">
                    <p>O jogo que estabeleceu o padrão ouro para o gênero "briga de rua" nos anos 90. Com sprites
                        gigantescos, gráficos detalhados e uma jogabilidade visceral, <em>Final Fight</em> transformou a
                        Capcom na rainha dos fliperamas antes mesmo de Street Fighter II.
                    </p>

                    <h4>📜 A História</h4>
                    <p>A gangue <strong>Mad Gear</strong> domina as ruas de Metro City e sequestrou Jessica, a filha do
                        recém-eleito prefeito, <strong>Mike Haggar</strong>. Furioso, o prefeito (um ex-lutador de luta
                        livre) rasga sua camisa e sai às ruas para resgatá-la com as próprias mãos, acompanhado de
                        <strong>Cody</strong> (namorado de Jessica) e <strong>Guy</strong> (um mestre ninja).</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>O Trio Clássico:</strong> Diferente da versão de SNES, o Arcade permite escolher
                            entre Haggar (Força), Cody (Equilíbrio) e Guy (Velocidade) e jogar em dupla simultaneamente.
                        </li>
                        <li><strong>Golpes Especiais:</strong> O jogo popularizou o "ataque desesperado" (pressionar
                            Pulo + Ataque), que derruba todos os inimigos ao redor ao custo de um pouco da sua própria
                            energia vital.</li>
                        <li><strong>Itens de Recuperação:</strong> Quebrar latões e encontrar um frango assado inteiro
                            ou um churrasco no chão para recuperar vida tornou-se um dos maiores clichês dos games
                            graças a este título.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>A dificuldade do Arcade é lendária. O desafio de terminar o jogo com apenas uma ficha (1CC) exige
                        domínio total do "pixel perfect" para evitar ser cercado, além de aprender a lidar com chefes
                        apelões como Sodom, Rolento e Abigail.
                    </p>
                </div>
                <br>

                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
