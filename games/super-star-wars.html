                <h3>Super Star Wars <br> Super Nintendo </h3>
                <p><strong>Desenvolvedora:</strong> LucasArts / Sculptured Software <br>
                    <strong>Editora:</strong> JVC / Nintendo <br>
                    <strong>Lançamento:</strong> 1992 <br>
                    <strong>Gênero:</strong> Ação, Plataforma (Run and Gun) <br>
                    <strong>Modos de Jogo:</strong> Single-player <br>
                </p>
                <div class="game-description">
                    <p>Um dos títulos mais desafiadores e tecnicamente impressionantes do SNES. <em>Super Star Wars</em>
                        adaptou o filme "Uma Nova Esperança" para um jogo de ação frenética, conhecido por sua
                        dificuldade brutal e uso inovador do chip gráfico do console.
                    </p>

                    <h4>📜 A História</h4>
                    <p>Reviva a jornada clássica de <strong>Luke Skywalker</strong>, desde sua vida monótona em Tatooine
                        até o ataque final à Estrela da Morte. Ao lado de Han Solo, Chewbacca e Obi-Wan, você deve
                        resgatar a Princesa Leia e enfrentar as forças do Império Galáctico.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Múltiplos Personagens:</strong> Começando apenas com Luke, você desbloqueia Han Solo
                            e Chewbacca conforme avança na história, cada um com armas e atributos diferentes.</li>
                        <li><strong>Fases com Mode 7:</strong> O jogo impressionou na época com níveis de veículo em "3D
                            simulado", pilotando o Landspeeder nas dunas e o X-Wing na trincheira da Estrela da Morte.
                        </li>
                        <li><strong>Evolução Jedi:</strong> Luke começa usando um blaster simples, mas ao longo do jogo
                            encontra o sabre de luz, desbloqueando ataques corpo a corpo e o famoso pulo giratório.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O verdadeiro "fator replay" aqui é a perseverança. Conhecido como um dos jogos mais difíceis da
                        biblioteca do SNES ("Nintendo Hard"), terminar o jogo nas dificuldades mais altas (Jedi) é um
                        feito para poucos, exigindo reflexos rápidos e memorização dos padrões dos chefes.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
