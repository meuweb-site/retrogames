                <h3>Diddy Kong Racing <br> Nintendo 64 </h3>
                <p><strong>Desenvolvedora:</strong> Rare <br>
                    <strong>Editora:</strong> Rare / Nintendo <br>
                    <strong>Lançamento:</strong> 1997 <br>
                    <strong>Gênero:</strong> Corrida de Aventura <br>
                    <strong>Modos de Jogo:</strong> Single-player (Aventura), Multiplayer (4 Jogadores) <br>
                </p>
                <div class="game-description">
                    <p>Mais do que apenas uma resposta ao Mario Kart, a Rare criou o melhor jogo de corrida
                        *single-player* da geração. Misturando a exploração de <em>Super Mario 64</em> com mecânicas de
                        pilotagem, ele conquistou fãs por sua profundidade, dificuldade e charme inigualável.
                    </p>

                    <h4>📜 A História</h4>
                    <p>O vilão intergaláctico <strong>Wizpig</strong> invadiu a pacífica "Timber's Island" e transformou
                        os melhores corredores em seus escravos. O tigre Timber convoca seu amigo Diddy Kong e outros
                        aliados para expulsar o porco mágico, vencendo corridas e coletando Balões Dourados para
                        desbloquear o caminho até sua nave espacial.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Três Veículos:</strong> A grande inovação. O jogador deve dominar não apenas o
                            <strong>Carro</strong> (Kart), mas também o <strong>Avião</strong> e o
                            <strong>Hovercraft</strong> (para água/terreno misto), cada um com físicas totalmente
                            diferentes.</li>
                        <li><strong>Chefes de Fase:</strong> Diferente de outros jogos do gênero, aqui você precisa
                            enfrentar chefes gigantes em corridas 1x1, como o triceratops Tricky e o polvo Bubbler.</li>
                        <li><strong>Estreia de Lendas:</strong> Foi a primeira aparição de personagens que se tornariam
                            ícones depois: <strong>Banjo</strong> (de Banjo-Kazooie) e <strong>Conker</strong> (antes de
                            virar um esquilo boca-suja).</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O jogo é enorme. Após terminar a história, você desbloqueia o "Adventure 2" (modo espelhado e
                        mais difícil). Além disso, vencer os "Time Trials" contra o relógio <strong>T.T.</strong> é o
                        único jeito de desbloqueá-lo como personagem jogável, um desafio que exige perfeição nas curvas.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
