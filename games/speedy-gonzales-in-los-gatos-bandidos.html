                <h3>Speedy Gonzales: Los Gatos Bandidos <br> Super Nintendo</h3>
                <p><strong>Desenvolvedora:</strong> Ukiyotei <br>
                    <strong>Editora:</strong> Sunsoft <br>
                    <strong>Lançamento:</strong> 1995 <br>
                    <strong>Gênero:</strong> Plataforma / Ação <br>
                    <strong>Modos de Jogo:</strong> Single-player <br>
                </p>
                <div class="game-description">
                    <p>Conhecido carinhosamente no Brasil apenas como "o jogo do Ligeirinho". É frequentemente comparado
                        ao Sonic
                        devido à sua jogabilidade frenética e física de aceleração. Um título vibrante que levou o
                        hardware do SNES
                        ao limite com fases coloridas e animações super fluidas.
                    </p>

                    <h4>📜 A História</h4>
                    <p>Durante uma grande "Fiesta" no vilarejo, o grupo conhecido como <strong>Los Gatos
                            Bandidos</strong> invade a festa e
                        sequestra todos os ratos da cidade. Apenas <strong>Speedy Gonzales</strong> (Ligeirinho), o rato
                        mais rápido de todo
                        o México, escapa e parte em uma missão de resgate para salvar seus amigos das garras dos
                        felinos.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Velocidade Supersônica:</strong> O jogo foca no <em>momentum</em>. Você precisa
                            correr para subir
                            loops verticais e saltar grandes abismos, lembrando muito a física dos jogos da Sega.</li>
                        <li><strong>Mecânica de Resgate:</strong> O objetivo não é apenas chegar ao fim da fase, mas
                            encontrar as
                            celas onde os ratos estão presos e chutá-las para libertá-los.</li>
                        <li><strong>Habilidade de Chute:</strong> Diferente de pular na cabeça dos inimigos, o
                            Ligeirinho usa um
                            chute rápido para derrotar os gatos e quebrar obstáculos.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O desafio aumenta consideravelmente nas fases finais. O fator replay vem da tentativa de
                        encontrar 100% dos
                        ratos escondidos em áreas secretas e paredes falsas, o que é necessário para completar o jogo
                        "de verdade".
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto
                    inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
