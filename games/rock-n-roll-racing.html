                <h2>Sobre o Jogo</h2>
                <p>Rock N' Roll Racing é um jogo eletrônico de corrida e de combate de veículos que possui um estilo
                    único para um jogo de 1993. Desenvolvido pela Blizzard Entertainment (que na época se chamava
                    Silicon & Synapse) e publicado pela Interplay, o grande forte do jogo é a trilha sonora no estilo
                    rock n' roll, o que adiciona mais emoção às corridas, ultrapassagens e principalmente a batidas "que
                    acontecem em excesso no decorrer das fases". Outro destaque é o estilo batalha que acompanha as
                    corridas com tiros e bombas voando para todos os lados. O game foi portado para o Game Boy Advance
                    em 2003.

                    Em 1994, a revista Electronic Gaming Monthly premiou este jogo como "O Melhor Jogo de Corrida do Ano
                    de 1993" ("Best Driving Game of 1993").[1] Foi eleito pela IGN como o 72º melhor jogo do SNES[2].
                </p>
                <br>
                <h2>Como Salvar</h2>

                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
