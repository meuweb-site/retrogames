                <h3>Harvest Moon: Back to Nature <br> PlayStation </h3>
                <p><strong>Desenvolvedora:</strong> Victor Interactive Software <br>
                    <strong>Editora:</strong> Natsume <br>
                    <strong>Lançamento:</strong> 1999 <br>
                    <strong>Gênero:</strong> Simulação, RPG <br>
                    <strong>Modos de Jogo:</strong> Single-player <br>
                </p>
                <div class="game-description">
                    <p>Considerado por muitos o auge da franquia clássica. <em>Back to Nature</em> pegou a base da
                        versão de Nintendo 64 e a expandiu no PlayStation, criando uma experiência viciante e relaxante
                        que mistura gerenciamento de tempo, agricultura e interação social.
                    </p>

                    <h4>📜 A História</h4>
                    <p>Você visita a fazenda do seu falecido avô na charmosa <strong>Mineral Town</strong>. O Prefeito
                        da cidade faz um acordo: você tem <strong>três anos</strong> para restaurar a fazenda à sua
                        antiga glória e ganhar a amizade dos moradores. Se falhar na avaliação final, será expulso da
                        vila.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>As 4 Estações:</strong> A jogabilidade muda drasticamente a cada estação. Você deve
                            plantar as safras corretas (nabos na primavera, milho no verão, etc.) e se preparar para o
                            rigoroso inverno, onde nada cresce.</li>
                        <li><strong>Vida Social e Casamento:</strong> O coração do jogo. Você deve interagir com os
                            vizinhos e pode conquistar uma das cinco candidatas (Karen, Ann, Popuri, Elli ou Mary) para
                            casar e ter um filho.</li>
                        <li><strong>Animais e Festivais:</strong> Cuide de vacas, galinhas e ovelhas, e participe de
                            eventos memoráveis como a Corrida de Cavalos e a Guerra de Tomates.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>Mesmo após os 3 anos, o jogo permite continuar indefinidamente. O desafio está em completar o
                        livro de receitas, encontrar todas as <strong>Power Berries</strong> escondidas, construir a
                        estufa e maximizar os lucros da fazenda com as ferramentas míticas.
                    </p>
                </div>
                <br>

                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
