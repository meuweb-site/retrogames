            <div id="gameInfo">
                <img src="../assets/images/spider-man.webp" alt="Capa do Jogo" class="game-cover">
                <h3>Spider-Man <br> Playstation </h3>
                <p><strong>Desenvolvedora:</strong> Neversoft <br>
                    <strong>Editora:</strong> Activision <br>
                    <strong>Lançamento:</strong> 2000 <br>
                    <strong>Gênero:</strong> Ação, Aventura <br>
                    <strong>Modos de Jogo:</strong> Single-player <br>
                </p>
                <div class="game-description">
                    <p>Este foi o jogo que definiu o gênero de super-heróis em 3D. Desenvolvido pela mesma equipe de
                        <em>Tony Hawk's Pro Skater</em>, o título utilizou a mesma engine para garantir uma jogabilidade
                        fluida e ágil que marcou época.</p>

                    <h4>📜 A História</h4>
                    <p>A trama começa com o roubo de uma tecnologia do Dr. Otto Octavius por um <strong>Homem-Aranha
                            impostor</strong>, tornando Peter Parker o inimigo público número 1. Com uma névoa
                        misteriosa cobrindo Nova York, o Aranha precisa limpar seu nome, descobrir a verdade e impedir
                        uma invasão de simbiontes.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Web-Swinging:</strong> A clássica mecânica de balançar pelas teias em ambiente 3D.
                        </li>
                        <li><strong>Stan Lee:</strong> O criador do herói narra a introdução e os menus do jogo, um
                            toque lendário.</li>
                        <li><strong>Galeria de Vilões:</strong> Enfrente clássicos como Venom, Scorpion, Rhino, Mysterio
                            e o chefe final "Monster Ock" (fusão de Carnificina com Dr. Octopus).</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O jogo brilha nos desbloqueáveis, incluindo dezenas de trajes com poderes diferentes (como o
                        <em>Symbiote Suit</em> e <em>Captain Universe</em>) e o famoso modo "What If?", que altera
                        diálogos e insere situações cômicas na história.</p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
