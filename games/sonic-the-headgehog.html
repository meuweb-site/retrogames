                <h3>Sonic The Hedgehog <br> Master System </h3>
                <p> Embora compartilhe o nome com o clássico do Mega Drive, a versão de Master System é um jogo
                    completamente distinto, construído do zero para o hardware de 8-bits. O jogo traz o carisma de Sonic
                    para uma aventura levemente mais lenta e focada em plataforma precisa, mas ainda assim rápida e
                    vibrante. O jogador deve percorrer zonas exclusivas, como a Bridge Zone e a Jungle Zone, para
                    derrotar o Dr. Robotnik. É amplamente considerado um dos melhores jogos de plataforma de toda a
                    biblioteca do console.

                    Dados Interessantes:

                    Lançado em 1991.

                    Desenvolvedora Diferente: Ao contrário da versão de 16-bits (feita pelo Sonic Team), esta versão foi
                    desenvolvida pela Ancient, estúdio fundado pelo lendário compositor Yuzo Koshiro.

                    Caça às Esmeraldas: Aqui, as Esmeraldas do Caos não são ganhas em fases especiais (Special Stages),
                    mas sim encontradas escondidas dentro dos próprios níveis.

                    Música Exclusiva: A trilha sonora adapta temas do Mega Drive, mas também possui composições
                    originais (como o tema da Bridge Zone) que se tornaram icônicas e foram reutilizadas em jogos
                    futuros da franquia.</p>
                <br>

                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
