                <h2>Sobre o Jogo</h2>
                <p>Lançado em 1992, Super Mario Kart para o Super Nintendo não apenas iniciou o subgênero de "corrida de
                    kart", como também se tornou
                    um dos jogos mais influentes da história. Ele foi um sucesso estrondoso ao combinar a diversão dos
                    personagens da franquia Mario
                    (como Mario, Luigi e Bowser) com um sistema de corrida caótico, mas preciso, impulsionado pelo chip
                    Mode 7 do SNES. O grande
                    diferencial foi a introdução de itens de poder — como cascos e bananas — transformando as corridas
                    em batalhas imprevisíveis e
                    altamente competitivas, especialmente no aclamado Battle Mode multiplayer.</p>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
