                <h3>Donkey Kong <br> Arcade </h3>
                <p><strong>Desenvolvedora:</strong> Nintendo R&D1 <br>
                    <strong>Editora:</strong> Nintendo <br>
                    <strong>Lançamento:</strong> 1981 <br>
                    <strong>Gênero:</strong> Plataforma <br>
                    <strong>Modos de Jogo:</strong> Single-player, 2-Player (Alternado) <br>
                </p>
                <div class="game-description">
                    <p>O jogo que começou tudo. Este clássico absoluto não só salvou a Nintendo da falência na América
                        nos anos 80, como também introduziu ao mundo duas lendas: o próprio Donkey Kong e o encanador
                        (na época carpinteiro) <strong>Jumpman</strong>, que logo se tornaria o mundialmente famoso
                        Mario.
                    </p>

                    <h4>📜 A História</h4>
                    <p>Inspirado em King Kong e Popeye, a trama é simples e icônica: o gorila Donkey Kong se revolta,
                        foge e sequestra a dama <strong>Pauline</strong>, levando-a para o topo de uma construção. Cabe
                        ao herói subir andaimes perigosos para resgatá-la.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>A Origem do Pulo:</strong> Foi um dos primeiros jogos a introduzir o pulo como
                            mecânica central para atravessar obstáculos e não apenas para evitar tiros.</li>
                        <li><strong>As 4 Fases:</strong> O loop do arcade consiste em 4 telas distintas: os Barris
                            (25m), as esteiras de Cimento (50m), os Elevadores (75m) e os Rebites (100m).</li>
                        <li><strong>O Martelo:</strong> O power-up clássico que permite destruir barris ao som daquela
                            música inesquecível, mas que te deixa vulnerável por não poder subir escadas.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>Como um legítimo arcade da Era de Ouro, o objetivo aqui é puramente o <strong>High
                            Score</strong>. A dificuldade aumenta a cada loop completado, tornando os barris mais
                        imprevisíveis e o tempo mais curto.
                    </p>
                </div>
                <br>

                Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                para continuar de onde parou.</p>
