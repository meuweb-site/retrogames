                <h3>Super Smash Bros <br> Nintendo 64 </h3>
                <p><strong>Desenvolvedora:</strong> HAL Laboratory <br>
                    <strong>Editora:</strong> Nintendo <br>
                    <strong>Lançamento:</strong> 1999 <br>
                    <strong>Gênero:</strong> Luta / Plataforma <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer (1-4) <br>
                </p>
                <div class="game-description">
                    <p>O jogo que iniciou um fenômeno global. Diferente dos lutadores tradicionais, aqui a barra de vida
                        foi
                        substituída por uma porcentagem de dano: quanto maior o número, mais longe seu oponente voa.
                        É a união improvável das maiores franquias da Nintendo em uma arena de batalha caótica.
                    </p>

                    <h4>📜 A História</h4>
                    <p>No universo do N64, os lutadores são, na verdade, <strong>bonecos trazidos à vida</strong> pela
                        imaginação
                        de uma entidade misteriosa conhecida como <strong>Master Hand</strong>. O modo clássico é uma
                        jornada para
                        derrotar essa "Mão Mestra" e provar quem é o maior herói (ou vilão) da Nintendo.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Elenco Original:</strong> Comece com 8 personagens (Mario, Link, Pikachu, etc.) e
                            descubra como liberar os 4 secretos.</li>
                        <li><strong>Caos Multiplayer:</strong> Foi um dos grandes responsáveis por popularizar o uso das
                            4 portas de controle do N64.</li>
                        <li><strong>Itens Icônicos:</strong> O uso estratégico de itens como o Martelo, a Pokébola e o
                            Leque de papel define as partidas.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>Além de desbloquear personagens como <em>Luigi</em>, <em>Ness</em> e <em>Captain Falcon</em>, o
                        jogo oferece os estágios bônus
                        "Break the Targets" e "Board the Platforms", que são desafios de plataforma únicos para cada
                        lutador,
                        exigindo domínio total das mecânicas.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
