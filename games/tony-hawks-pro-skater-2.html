                <h3>Tony Hawk's Pro Skater 2<br> Playstation </h3>
                <p> Ano de Lançamento: 2000

                    Considerado por muitos não apenas o melhor jogo de esporte, mas um dos melhores jogos de todos os
                    tempos, THPS2 pegou tudo o que o original fez e elevou ao quadrado. A grande inovação mecânica foi a
                    introdução do Manual (empinar o skate no chão), que permitia aos jogadores ligar manobras de street
                    e vert em um único combo gigantesco, mudando a jogabilidade para sempre.

                    Dados Interessantes:

                    O Herói da Marvel: O jogo é famoso por incluir o Homem-Aranha como personagem secreto desbloqueável,
                    completo com manobras exclusivas usando teias.

                    Personalização: Foi o primeiro da série a introduzir o modo Create-A-Skater (Crie um Skatista) e o
                    Park Editor (Editor de Pistas), dando vida quase infinita ao jogo.

                    Aclamação Crítica: No Metacritic, ele segura uma das notas mais altas da história dos videogames
                    (98/100), ficando tecnicamente empatado com lendas como GTA IV e SoulCalibur.</p>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
