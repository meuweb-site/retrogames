            <div id="gameInfo">
                <img src="../assets/images/space-invaders.webp" alt="Capa do Jogo Space Invaders" class="game-cover">
                <h3>Space Invaders <br> Arcade </h3>
                <p><strong>Desenvolvedora:</strong> Taito <br>
                    <strong>Editora:</strong> Taito / Midway <br>
                    <strong>Lançamento:</strong> 1978 <br>
                    <strong>Gênero:</strong> Shoot 'em up (Tiro Fixo) <br>
                    <strong>Modos de Jogo:</strong> Single-player, 2-Player (Alternado) <br>
                </p>
                <div class="game-description">
                    <p>O pai dos videogames modernos. Lançado no final dos anos 70, <em>Space Invaders</em> não foi
                        apenas um jogo, foi um fenômeno cultural que supostamente causou escassez de moedas de 100 ienes
                        no Japão e definiu a estrutura dos jogos de tiro por décadas.
                    </p>

                    <h4>📜 A História</h4>
                    <p>A premissa é simples e aterrorizante: uma horda alienígena desce do céu em formação de marcha
                        organizada. Você controla a última linha de defesa da Terra (um canhão laser móvel) e deve
                        destruir todos os invasores antes que eles toquem o solo.</p>

                    <h4>🏆 A Primeira Campeã de eSports</h4>
                    <p>Em 1980, a Atari organizou o <em>National Space Invaders Championship</em>, o primeiro torneio de
                        grande escala da história, com mais de 10.000 participantes. A vitória foi da americana
                        <strong>Rebecca Heineman</strong>, que se tornou a primeira campeã nacional de videogames
                        reconhecida, marcando o nascimento dos esportes eletrônicos.
                    </p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>O Som do Medo:</strong> A trilha sonora minimalista de 4 notas acelera conforme os
                            inimigos morrem e se aproximam, criando uma tensão psicológica crescente e inédita para a
                            época.</li>
                        <li><strong>Estratégia dos Bunkers:</strong> Você possui quatro barreiras defensivas que se
                            degradam com os tiros (tanto seus quanto dos inimigos), exigindo sabedoria ao usá-las como
                            escudo.</li>
                        <li><strong>O Disco Voador:</strong> O misterioso "UFO" vermelho que passa pelo topo da tela
                            ocasionalmente vale pontos extras cruciais para o recorde.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>A busca pelo <strong>High Score</strong>. O jogo não tem fim; ele apenas reinicia (loop) ficando
                        mais rápido e difícil. Dominar técnicas avançadas (como o lendário "Nagoya Attack") para
                        maximizar a pontuação é o que mantém os jogadores competindo há mais de 40 anos.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
