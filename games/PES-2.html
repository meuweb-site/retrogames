                <h2>Sobre o Jogo</h2>
                <p>Lançado em 2002, o Pro Evolution Soccer 2 para PlayStation 2 consolidou a série da Konami como a
                    principal concorrente no gênero de simulação de futebol. Este título é lembrado por muitos fãs como
                    o ponto onde a franquia atingiu o seu primeiro ápice em jogabilidade. Apesar da notória falta de
                    licenças oficiais (com nomes de times fictícios como Aragon e London), o jogo compensava com uma
                    física de bola revolucionária e uma inteligência artificial desafiadora, que exigia táticas e passes
                    precisos. Com aprimoramentos na icônica Master League e uma jogabilidade fluida, o PES 2 estabeleceu
                    o padrão de realismo e estratégia que definiria o futebol virtual por anos.</p>
                <h2>Como Salvar</h2>

                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
