                <h2>Sobre o Jogo</h2>
                <p>Goof Troop é um jogo de Aventura com elementos de Puzzles, desenvolvido e publicado pela Capcom
                    lançado no ano de 1993, para a plataforma SNES (Super Nintendo). O game é baseado na série de mesmo
                    nome, aqui no Brasil conhecido como A Turma do Pateta, série de desenho animado lançado em 1992, mas
                    exibido aqui no Brasil em 1997. A história é bem simples, em um belo dia ensolarado, Pateta e Max
                    decidem junto com Bafo e B.J. de fazer uma pescaria em Spoonerville, durante a pescaria, Pateta e
                    Max avistam um navio pirata seguindo em direção a Ilha de Spoonerville, e dentro do navio estavam
                    Bafo e B.J. que haviam sido sequestrados pelos piratas. Então a dupla resolve ir até a ilha para
                    resgatar seus amigos dos terríveis piratas que estão espalhados pela região. </p>
                    <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
