                <h3>Sonic The Hedgehog 2 <br> Master System </h3>
                <p> Nesta sequência direta, o Dr. Robotnik sequestrou o novo amigo de Sonic, a raposa Tails, e o ouriço
                    deve resgatá-lo. Sonic 2 para Master System expandiu as mecânicas do primeiro jogo, introduzindo
                    elementos inovadores como o uso de carrinhos de mina, asas-deltas e bolhas de ar gigantes. O jogo é
                    conhecido por ser consideravelmente mais difícil que o seu antecessor, exigindo reflexos rápidos e
                    muita exploração.

                    Dados Interessantes:

                    Lançado em 1992.

                    Lançamento Antecipado: Curiosamente, este jogo foi lançado na Europa e no Brasil antes da versão
                    famosa de Mega Drive (Genesis). Foi a primeira vez que o mundo viu o personagem Tails (embora ele
                    não seja jogável aqui).

                    Finais Diferentes: O jogo possui dois finais. Se o jogador não coletar todas as Esmeraldas do Caos,
                    o final é considerado "triste", pois Sonic corre sozinho sob o céu estrelado e uma imagem de Tails
                    aparece no céu, indicando que ele não foi salvo.

                    Gameplay Distinto: Ao contrário do Sonic 2 de Mega Drive, aqui Sonic ainda não possui o movimento
                    Spin Dash (o famoso "rolinho" para ganhar velocidade parado), mantendo a jogabilidade mais focada no
                    momento e na inércia.</p>
                <br>

                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
