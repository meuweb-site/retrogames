                <h2>Sobre o Jogo</h2>
                <p>Super Monaco GP é um marco dos jogos de corrida, lançado inicialmente para Arcade em Maio de 1989 e
                    posteriormente levado com sucesso ao Mega Drive em Agosto de 1990 pela SEGA, além de receber portas
                    para Master System, Game Gear e outros computadores. A versão de Mega Drive se destacou ao expandir
                    o conceito arcade de uma única corrida para um ambicioso "World Championship", simulando uma
                    temporada completa de Fórmula 1.

                    O jogo imerge o jogador na competição, começando em equipes modestas e permitindo a progressão de
                    carreira ao longo de 16 circuitos baseados na temporada de 1989, desafiando rivais diretos para
                    assumir o volante de carros melhores. A jogabilidade é desafiadora e considerada inovadora para a
                    época, exigindo do jogador domínio do câmbio manual e precisão nas curvas em alta velocidade, com
                    uma visão em perspectiva que simula a sensação de estar atrás do volante. A trilha sonora, com temas
                    vibrantes como "Super License," e a intensidade das corridas fizeram de Super Monaco GP um clássico
                    nostálgico e um dos títulos mais importantes do gênero no catálogo do Mega Drive.</p>
