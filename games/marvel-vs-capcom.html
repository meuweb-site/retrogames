                <h3>Marvel vs. Capcom: Clash of Super Heroes <br> Arcade / PlayStation </h3>
                <p><strong>Desenvolvedora:</strong> Capcom <br>
                    <strong>Editora:</strong> Capcom <br>
                    <strong>Lançamento:</strong> 1998 <br>
                    <strong>Gênero:</strong> Luta 2D (Tag Team) <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer Versus <br>
                </p>
                <div class="game-description">
                    <p>Um dos crossovers mais celebrados da história. Unindo os heróis dos quadrinhos com os ícones dos
                        videogames, este título elevou o caos dos jogos de luta da Capcom (na placa CPS-2) a um novo
                        nível, com combos aéreos infinitos e especiais que ocupam a tela inteira.
                    </p>

                    <h4>📜 A História</h4>
                    <p>A entidade psíquica maligna <strong>Onslaught</strong> (Massacre) está ameaçando a existência de
                        ambos os universos. O Professor Xavier chama os heróis para ajudar, unindo Vingadores, X-Men e
                        lutadores de rua para impedir a aniquilação total.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Special Partner (Assist):</strong> A grande inovação deste jogo. Além da sua dupla
                            de lutadores, você escolhe um terceiro personagem "convidado" (como Thor, Arthur ou Jubilee)
                            que entra apenas para dar um ataque rápido e sair.</li>
                        <li><strong>Duo Team Attack:</strong> Um especial devastador onde, por um curto período, você
                            controla seus dois personagens ao mesmo tempo na tela, permitindo um massacre de <em>Hyper
                                Combos</em> simultâneos.</li>
                        <li><strong>Elenco Variado:</strong> Marcou a estreia de personagens inusitados da Capcom, como
                            Mega Man, Strider Hiryu e Captain Commando, lutando contra Venom, Gambit e Wolverine.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>Além de dominar os combos aéreos, o jogo é cheio de segredos. Existem diversos personagens
                        escondidos para liberar (como a <strong>Shadow Lady</strong>, Roll e o Gold War Machine) e
                        transformações secretas durante a luta (como Ryu mudando para o estilo Ken ou Akuma).
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
