                <h3>Diddy Kong Racing <br> Nintendo 64 </h3>
                <p><strong>Desenvolvedora:</strong> Rareware <br>
                    <strong>Editora:</strong> Rare / Nintendo <br>
                    <strong>Lançamento:</strong> 1997 <br>
                    <strong>Gênero:</strong> Corrida de Kart / Aventura <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer (1-4) <br>
                </p>
                <div class="game-description">
                    <p>Mais do que um simples jogo de corrida, é uma "Aventura sobre Rodas". A Rare pegou a fórmula de
                        Mario Kart
                        e a expandiu absurdamente, criando um mundo aberto explorável, uma história envolvente e
                        mecânicas que
                        misturam pilotagem com exploração. É também o jogo de estreia de personagens icônicos como
                        <strong>Banjo</strong>
                        (de Banjo-Kazooie) e <strong>Conker</strong>.
                    </p>

                    <h4>📜 A História</h4>
                    <p>O porco mago intergaláctico, <strong>Wizpig</strong>, invadiu a pacífica Ilha de Timber e
                        transformou os
                        campeões de corrida em seus servos. Timber, o tigre, convoca seus amigos (incluindo Diddy Kong)
                        para
                        participar de um grande torneio, derrotar os chefes dominados por Wizpig e expulsar o tirano do
                        planeta.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Três Veículos:</strong> A grande revolução. Você não dirige apenas karts (Carros); o
                            jogo exige
                            que você domine o <strong>Hovercraft</strong> (para água e terrenos difíceis) e o
                            <strong>Avião</strong>
                            (para combates aéreos e pistas verticais), mudando completamente a estratégia de cada pista.
                        </li>
                        <li><strong>Modo Aventura:</strong> Diferente de apenas disputar copas, aqui você viaja por um
                            "Hub World",
                            coleta <strong>Balões Dourados</strong> para destrancar novas áreas, procura chaves
                            escondidas e
                            conversa com o elefante gênio Taj para desafios extras.</li>
                        <li><strong>Batalhas contra Chefes:</strong> Ao final de cada mundo, você deve enfrentar um
                            chefe gigante em uma
                            corrida 1x1, como o triceratops <em>Tricky</em> ou a morsa <em>Bluey</em>, algo inédito para
                            o gênero na época.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O jogo é enorme. Após vencer as pistas, você deve revisitá-las no desafio das <strong>Moedas de
                            Prata</strong>
                        (coletar 8 moedas espalhadas pela pista enquanto corre e chega em primeiro). Desbloquear os
                        personagens secretos,
                        como o <strong>Galo Drumstick</strong> e o relógio <strong>T.T.</strong> (o melhor piloto do
                        jogo), exige habilidade máxima.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
