                <h3>Bust-A-Move (Puzzle Bobble) <br> Super Nintendo </h3>
                <p><strong>Desenvolvedora:</strong> Taito <br>
                    <strong>Editora:</strong> Taito <br>
                    <strong>Lançamento:</strong> 1995 <br>
                    <strong>Gênero:</strong> Puzzle / Raciocínio <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer (1-2) <br>
                </p>
                <div class="game-description">
                    <p>Conhecido no Japão como <em>Puzzle Bobble</em>, este título trouxe os simpáticos dinossauros Bub
                        e Bob (do clássico
                        <em>Bubble Bobble</em>) para um gênero totalmente novo. Com uma jogabilidade simples de "juntar
                        3 cores", mas
                        com uma profundidade estratégica incrível, tornou-se um dos jogos de quebra-cabeça mais amados
                        de todos os tempos.
                    </p>

                    <h4>📜 A História</h4>
                    <p>Embora o foco seja a jogabilidade, a premissa é charmosa: os dragõezinhos Bub e Bob operam um
                        canhão de bolhas
                        para limpar os estágios e salvar seus amigos que foram aprisionados dentro das esferas coloridas
                        pelos vilões
                        da série.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Mecânica de Tabelas:</strong> O grande segredo do jogo. Mirar diretamente nem sempre
                            é a solução;
                            o jogador profissional sabe usar as paredes laterais para fazer a bolha ricochetear e
                            alcançar lugares impossíveis.</li>
                        <li><strong>O Teto está Caindo:</strong> A pressão é constante. A cada certo número de jogadas,
                            o teto desce,
                            espremendo o espaço disponível. Se uma bolha cruzar a linha inferior, é Game Over.</li>
                        <li><strong>Trilha Sonora:</strong> Possui uma das músicas mais cativantes (e repetitivas de um
                            jeito bom) da
                            era 16-bits, ditando o ritmo frenético das partidas.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O <strong>Modo Versus</strong> é lendário. Ao estourar grandes grupos de bolhas ou derrubá-las,
                        você envia
                        "bolhas de lixo" para a tela do adversário, criando uma competição acirrada e destruidora de
                        amizades que garante
                        diversão infinita.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
