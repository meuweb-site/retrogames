                <h3>Lamborghini American Challenge <br> Super Nintendo </h3>
                <p><strong>Desenvolvedora:</strong> Titus Software <br>
                    <strong>Editora:</strong> Titus Software <br>
                    <strong>Lançamento:</strong> 1993 <br>
                    <strong>Gênero:</strong> Corrida / Arcade <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer (1-2) <br>
                </p>
                <div class="game-description">
                    <p>Muito mais do que apenas um jogo de corrida, este é um simulador de "rachas" ilegais de luxo.
                        Evolução direta da série <em>Crazy Cars</em>, o jogo colocou você no cockpit do lendário
                        Lamborghini Diablo para cruzar os Estados Unidos, fugindo da polícia e apostando alto contra
                        rivais locais.
                    </p>

                    <h4>📜 A História</h4>
                    <p>Não há heróis aqui. Você é um piloto de rua no cenário underground americano. O objetivo é
                        puramente capitalista:
                        começar com pouco dinheiro, vencer corridas de Boston a São Francisco, acumular fortuna para
                        pagar as
                        taxas de inscrição (Race Passes) cada vez mais caras e se tornar o campeão nacional.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>O Sistema de Apostas:</strong> O grande diferencial. Antes de cada corrida, você
                            aposta contra os outros
                            pilotos. Se vencer, leva o pote; se perder, fica sem dinheiro para consertar o carro e pode
                            dar Game Over por falência.</li>
                        <li><strong>Loja de Tuning:</strong> O dinheiro serve para equipar seu Diablo com
                            <em>Turbos</em>, pneus de
                            alta aderência, câmbio de 6 marchas e, o mais importante: o <strong>Detector de
                                Radar</strong> e o <strong>Jammer</strong>
                            para evitar a polícia.</li>
                        <li><strong>Polícia Implacável:</strong> A polícia rodoviária é uma ameaça constante. Se o radar
                            te pegar, eles virão
                            atrás de você, multando e fazendo você perder tempo precioso na corrida.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>A progressão do jogo é viciante. Começar com um carro "lento" e transformá-lo em uma máquina
                        imbatível capaz de
                        deixar os rivais comendo poeira em cenários noturnos e chuvosos é extremamente satisfatório. O
                        modo
                        multiplayer em tela dividida também garantia horas de diversão.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
