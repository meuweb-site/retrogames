                <h3>The Legend of the Mystical Ninja <br> Super Nintendo </h3>
                <p><strong>Desenvolvedora:</strong> Konami <br>
                    <strong>Editora:</strong> Konami <br>
                    <strong>Lançamento:</strong> 1992 <br>
                    <strong>Gênero:</strong> Ação / Aventura <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer (Co-op) <br>
                </p>
                <div class="game-description">
                    <p>Conhecido no Japão como <em>Ganbare Goemon</em>, este título é uma joia da "era de ouro" da
                        Konami. Ele
                        mistura exploração de cidades (estilo RPG) com fases de plataforma frenéticas, tudo envolto em
                        um folclore
                        japonês excêntrico e uma trilha sonora espetacular que usa instrumentos tradicionais com a
                        batida do SNES.
                    </p>

                    <h4>📜 A História</h4>
                    <p>Você controla <strong>Kid Ying</strong> (Goemon) e <strong>Dr. Yang</strong> (Ebisumaru) após
                        notarem acontecimentos
                        estranhos na cidade de Oedo. O que começa como uma investigação sobre um fantasma no templo logo
                        se torna uma
                        missão épica para resgatar a Princesa Yuki e impedir os planos do Exército Oedo.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Dois Estilos de Jogo:</strong> O jogo alterna entre o "Modo Cidade" (onde você
                            compra itens, armaduras,
                            comida e conversa com moradores) e o "Modo Ação" (fases de plataforma laterais clássicas com
                            chefes no final).</li>
                        <li><strong>Co-Op "Cavalinho":</strong> O multiplayer é hilário e estratégico. Um jogador pode
                            carregar o outro
                            nas costas; quem carrega controla o movimento e quem vai em cima controla os ataques,
                            dobrando o poder de fogo.</li>
                        <li><strong>Mini-Games Lendários:</strong> As cidades têm casas de jogos onde você pode jogar
                            dados, hóquei aéreo
                            e até mesmo a <strong>primeira fase completa de Gradius</strong> (o jogo de nave da Konami)
                            dentro deste jogo!</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>A diversão aumenta exponencialmente com dois jogadores. Além disso, o jogo é repleto de segredos,
                        lojas escondidas
                        e Jutsus (magias) para desbloquear (como voar ou invocar um tigre). A dificuldade progressiva e
                        o humor
                        pastelão garantem que você queira jogar até o fim.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
