            <div id="gameInfo">
                <img src="../../assets/images/nintendo/SNES/aladdin.webp" alt="Capa do Jogo" class="game-cover">
                <h3>Disney's Aladdin <br> Super Nintendo (SNES)</h3>
                <p><strong>Desenvolvedora:</strong> Capcom <br>
                    <strong>Editora:</strong> Capcom <br>
                    <strong>Lançamento:</strong> 1993 <br>
                    <strong>Gênero:</strong> Plataforma <br>
                    <strong>Modos de Jogo:</strong> Single-player <br>
                </p>
                <div class="game-description">
                    <p>Diferente da versão de Mega Drive, esta joia da Capcom foca na acrobacia e na exploração.
                        Considerado por muitos como o jogo mais fiel visualmente à animação original, ele utiliza
                        sprites
                        que capturam perfeitamente a magia da Disney.</p>

                    <h4>📜 A História</h4>
                    <p>A trama segue fielmente o filme de 1992. Você controla Aladdin, o "diamante bruto", em sua
                        jornada
                        das ruas de Agrabah até o palácio do Sultão. Com a ajuda do Gênio, você deve impedir o vizir
                        Jafar de obter a Lâmpada Mágica e salvar a Princesa Jasmine.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Parkour Árabe:</strong> A mecânica principal envolve pular na cabeça dos inimigos e
                            utilizar uma lençol para planar, focando mais em plataforma do que em combate com espadas.
                        </li>
                        <li><strong>O Gênio:</strong> O personagem rouba a cena na roleta de bônus entre as fases,
                            oferecendo vidas e itens extras.</li>
                        <li><strong>Fase do Tapete:</strong> O inesquecível (e difícil) estágio de fuga da Caverna das
                            Maravilhas voando no Tapete Mágico.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O desafio de encontrar todos os diamantes vermelhos escondidos nas fases para desbloquear o final
                        verdadeiro mantém os jogadores voltando para Agrabah repetidas vezes.</p>
                </div>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
