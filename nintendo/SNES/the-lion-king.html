                <h3>The Lion King <br> Super Nintendo </h3>
                <p><strong>Desenvolvedora:</strong> Westwood Studios <br>
                    <strong>Editora:</strong> Virgin Interactive <br>
                    <strong>Lançamento:</strong> 1994 <br>
                    <strong>Gênero:</strong> Plataforma / Ação <br>
                    <strong>Modos de Jogo:</strong> Single-player <br>
                </p>
                <div class="game-description">
                    <p>Um marco visual do SNES. A Virgin fez uma parceria inédita com a Disney, permitindo que os
                        próprios animadores
                        do filme desenhassem os sprites do jogo. O resultado foi uma animação fluida que parecia um
                        desenho vivo,
                        escondendo sob sua beleza uma das dificuldades mais brutais da história dos videogames.
                    </p>

                    <h4>📜 A História</h4>
                    <p>Você revive a jornada épica de <strong>Simba</strong>, do nascimento ao reinado. O jogo é
                        dividido em duas partes:
                        a infância (onde você é vulnerável e brincalhão) e a fase adulta (onde você retorna para
                        enfrentar Scar e
                        reclamar a Pedra do Reino).</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Duas Jogabilidades:</strong> Como <em>Simba Filhote</em>, você derrota inimigos
                            pulando na cabeça e usa o
                            rugido para atordoar ou virar porcos-espinhos. Como <em>Simba Adulto</em>, o jogo vira um
                            "brawler", onde você usa
                            patadas violentas e arremessos.</li>
                        <li><strong>A Infame "Fase dos Macacos":</strong> O nível "I Just Can't Wait to Be King" é
                            lendário por seu
                            puzzle confuso envolvendo macacos que te arremessam. É o ponto onde muitos jogadores
                            desistiram nos anos 90.</li>
                        <li><strong>Trilha Sonora:</strong> Versões 16-bits incrivelmente fiéis das músicas de Elton
                            John e Hans Zimmer,
                            incluindo "Circle of Life" e "Hakuna Matata".</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O fator replay aqui é puramente a superação. O jogo é curto, mas a dificuldade elevada
                        (especialmente na fase da
                        cachoeira e na fuga dos gnus) exige uma memorização perfeita (pixel-perfect) dos obstáculos.
                        Zerar este jogo
                        sem "cheats" é um atestado de habilidade.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
