                <h3>Demolition Man (O Demolidor) <br> Super Nintendo </h3>
                <p><strong>Desenvolvedora:</strong> Acclaim Studios London <br>
                    <strong>Editora:</strong> Acclaim Entertainment <br>
                    <strong>Lançamento:</strong> 1995 <br>
                    <strong>Gênero:</strong> Ação / Plataforma / Shooter <br>
                    <strong>Modos de Jogo:</strong> Single-player <br>
                </p>
                <div class="game-description">
                    <p>Baseado no filme de sucesso de Sylvester Stallone e Wesley Snipes. O jogo captura perfeitamente a
                        vibe de ação
                        frenética dos anos 90. É famoso por não se prender a um único estilo: em um momento você está em
                        um jogo de
                        plataforma lateral (run and gun) e, no próximo, o jogo muda para uma visão aérea (top-down)
                        tática, mantendo
                        a adrenalina sempre alta.
                    </p>

                    <h4>📜 A História</h4>
                    <p>O ano é 2032, na pacífica San Angeles. O sargento <strong>John Spartan</strong> (O Demolidor) é
                        descongelado da
                        prisão criogênica para caçar seu arqui-inimigo, o psicopata <strong>Simon Phoenix</strong>, que
                        escapou e está
                        causando o caos em uma sociedade que esqueceu como lidar com a violência.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Duas Perspectivas:</strong> O grande trunfo do jogo. As fases alternam entre a visão
                            lateral clássica
                            (estilo <em>Contra</em>) e a visão de cima (estilo <em>Smash TV</em> ou <em>True Lies</em>),
                            exigindo que o
                            jogador domine duas mecânicas de tiro diferentes.</li>
                        <li><strong>Arsenal Pesado:</strong> Spartan não luta de mãos vazias. Você conta com pistolas,
                            escopetas, granadas
                            de luz e tiros rápidos para enfrentar as gangues futuristas de Phoenix.</li>
                        <li><strong>Fidelidade ao Filme:</strong> O jogo recria cenas icônicas, como a batalha na prisão
                            criogênica, a perseguição
                            nos esgotos subterrâneos e o tiroteio final no museu de armas antigas.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>A dificuldade é "anos 90", ou seja, bem punitiva. O fator replay vem do desafio de memorizar onde
                        os inimigos
                        aparecem nas fases de visão aérea (que são labirínticas) e encontrar todas as vidas extras
                        escondidas para conseguir
                        chegar ao confronto final com Phoenix. E não, o jogo não ensina como usar as <strong>três
                            conchas</strong>.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções

                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
