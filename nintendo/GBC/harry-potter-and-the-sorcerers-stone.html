                <h3>Harry Potter and the Sorcerer's Stone <br> Game Boy Color </h3>
                <p><strong>Desenvolvedora:</strong> Griptonite Games <br>
                    <strong>Editora:</strong> Electronic Arts <br>
                    <strong>Lançamento:</strong> 2001 <br>
                    <strong>Gênero:</strong> RPG de Turnos <br>
                    <strong>Modos de Jogo:</strong> Single-player <br>
                </p>
                <div class="game-description">
                    <p>Considerado por muitos fãs como a melhor adaptação portátil do primeiro livro. Enquanto os
                        consoles de mesa
                        ganharam jogos de plataforma, o GBC recebeu um <strong>RPG completo</strong> no estilo <em>Final
                            Fantasy</em>.
                        Você evolui de nível, compra equipamentos no Beco Diagonal e explora uma Hogwarts rica em
                        detalhes pixelados.
                    </p>

                    <h4>📜 A História</h4>
                    <p>Acompanha fielmente o primeiro ano de Harry: desde a chegada das cartas na Rua dos Alfeneiros, a
                        compra da varinha
                        no Sr. Olivaras, até a batalha final nos corredores do terceiro andar. A narrativa é contada por
                        diálogos em texto
                        e cutscenes estáticas muito bem desenhadas para a capacidade do portátil.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Poliglota:</strong> Uma característica marcante do cartucho era o menu inicial
                            repleto de bandeiras.
                            Você podia jogar em Inglês, Espanhol, Francês, Alemão, Italiano, Holandês, Português, etc.,
                            tornando-o um dos
                            jogos mais acessíveis da época.</li>
                        <li><strong>Combate por Turnos:</strong> As batalhas são estratégicas. Você usa Pontos de Magia
                            (MP) para lançar
                            feitiços como <em>Flipendo</em> e <em>Vermillious</em> contra ratos, armaduras e gnomos,
                            ganhando XP para
                            aumentar sua vida e poder.</li>
                        <li><strong>Combinação de Cartas:</strong> As Cartas dos Bruxos Famosos não são apenas
                            colecionáveis; você pode
                            equipar combinações específicas (Combos de Cartas) para ganhar bônus de ataque ou
                            resistência em batalha.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>Além de tentar completar o álbum com todas as Cartas de Bruxos Famosos (escondidas em passagens
                        secretas atrás de
                        quadros e estátuas), o jogo possui missões secundárias de "busca e entrega" para outros alunos,
                        incentivando a
                        exploração minuciosa de cada canto do castelo para alcançar o nível máximo (Level 99).
                    </p>
                </div>

                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções

                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
