            <div id="gameFrame">

                    <p>💡 Para jogar em tela cheia, clique no ícone de configurações "↓" no centro do emulador e então "Enter Full Screen"</p>

            <div id="gameInfo">
                <img src="../../assets/images/nintendo/Nintendo-DS/cartoon-network-racing.webp"
                    alt="Capa do Jogo Cartoon Network Racing" class="game-cover">
                <h3>Cartoon Network Racing <br> Ninttendo DS </h3>
                <p><strong>Desenvolvedora:</strong> Eutechnyx <br>
                    <strong>Editora:</strong> The Game Factory <br>
                    <strong>Lançamento:</strong> 2006 <br>
                    <strong>Gênero:</strong> Corrida de Kart <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer (1-2) <br>
                </p>
                <div class="game-description">
                    <p>Muitos chamam de "o Mario Kart do Cartoon Network". Este jogo reuniu a era de ouro do canal em
                        uma
                        competição de velocidade caótica. Se você cresceu assistindo <em>O Laboratório de Dexter</em>,
                        <em>As Meninas
                            Superpoderosas</em> ou <em>A Vaca e o Frango</em>, este é um prato cheio de nostalgia.
                    </p>

                    <h4>📜 A História</h4>
                    <p>O pretexto é um grande campeonato interdimensional onde os personagens mais icônicos do canal
                        competem
                        para decidir quem é a estrela mais rápida do universo Cartoon. Não há uma trama densa, o foco é
                        a
                        diversão pura e as referências aos desenhos.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Estilo "Double Dash":</strong> A mecânica lembra muito <em>Mario Kart: Double
                                Dash</em>.
                            Você escolhe um motorista e um co-piloto, permitindo usar poderes especiais únicos (Toon
                            Powers)
                            que variam dependendo da dupla escolhida.</li>
                        <li><strong>Elenco de Peso:</strong> Conta com 24 personagens jogáveis de 6 desenhos diferentes,
                            incluindo Johnny Bravo, Coragem o Cão Covarde e Eu Sou o Máximo.</li>
                        <li><strong>Itens Loucos:</strong> Use itens baseados nos desenhos, como a pimenta do Dexter ou
                            bigornas clássicas para atrasar os oponentes.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O jogo brilha nos desbloqueáveis. Além de liberar novos pilotos e karts, vencer os campeonatos
                        desbloqueia
                        <strong>episódios reais</strong> dos desenhos animados para assistir dentro do jogo (Galeria),
                        um bônus incrível
                        para os fãs e colecionadores.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
