                <h3>Space Jam <br> PlayStation </h3>
                <p><strong>Desenvolvedora:</strong> Sculptured Software <br>
                    <strong>Editora:</strong> Acclaim Entertainment <br>
                    <strong>Lançamento:</strong> 1996 <br>
                    <strong>Gênero:</strong> Esporte / Arcade (Basquete) <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer (1-6 jogadores) <br>
                </p>
                <div class="game-description">
                    <p>Baseado no filme icônico que uniu Michael Jordan aos Looney Tunes. Utilizando a engine de
                        basquete da Acclaim
                        (famosa pela série <em>NBA Jam</em>), o jogo oferece uma experiência arcade 3-contra-3 rápida e
                        descompromissada,
                        misturada com diversos minigames que servem para aumentar os atributos dos personagens antes da
                        grande final.
                    </p>

                    <h4>📜 A História</h4>
                    <p>A trama segue fielmente o filme: os alienígenas Nerdlucks roubaram o talento dos maiores astros
                        da NBA e se transformaram
                        nos terríveis <strong>Monstars</strong>. Pernalonga e sua turma recrutam Michael Jordan para uma
                        partida decisiva.
                        Sua missão é treinar o "Tune Squad" e vencer o jogo do século para evitar que os personagens
                        sejam escravizados na Montanha Bobolândia.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Basquete Arcade (3v3):</strong> A jogabilidade é focada na diversão exagerada, com
                            enterradas que desafiam a
                            gravidade, empurrões permitidos e power-ups, permitindo controlar Jordan, Taz, Patolino e
                            Lola Bunny em quadra.</li>
                        <li><strong>Mini-Games de Treino:</strong> Entre as partidas, o jogo muda de gênero. Você deve
                            completar missões variadas,
                            como encontrar o uniforme perdido do Michael Jordan, participar de corridas espaciais ou
                            competições de arremesso para melhorar o time.</li>
                        <li><strong>Monstars Jogáveis:</strong> Além do time dos heróis, é possível jogar com os vilões
                            superpoderosos, o que
                            muda a dinâmica das partidas devido ao tamanho e força bruta deles.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O grande trunfo é o suporte para <strong>Multiplayer</strong>. O jogo permite até 6 jogadores
                        simultâneos (com o uso do acessório Multitap),
                        transformando a quadra em um caos divertido. É um daqueles jogos perfeitos para reunir a galera
                        em uma tarde nostálgica.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
