                <h2>Sobre o Jogo</h2>
                <p>Lançado em 1999 para o <strong>PlayStation 1</strong> (e posteriormente para PC, N64 e Game Boy
                    Color), <em>Disney's Tarzan</em> é um dos melhores exemplos de jogos baseados em filmes daquela era.
                    Desenvolvido pela Eurocom, o game utiliza um estilo "2.5D", onde o gameplay é de plataforma lateral,
                    mas os cenários e personagens são renderizados em 3D, criando uma profundidade incrível para a
                    época.</p>
                <p><strong>Por que ele merece entrar na coleção?</strong> Além de capturar perfeitamente a estética do
                    filme, o jogo é extremamente fluido. As mecânicas de "surfar" nos galhos e balançar nos cipós são
                    satisfatórias até hoje. A trilha sonora conta com adaptações das músicas icônicas de <strong>Phil
                        Collins</strong>, o que eleva a nostalgia ao máximo.</p>

                <h2>Como Salvar</h2>
                <p>O sistema de salvamento deste jogo é clássico do PS1:
                <ul>
                    <li><strong>Memory Card:</strong> Você precisa ter um Memory Card inserido no Slot 1 ou 2 antes de
                        iniciar o console.</li>
                    <li><strong>Tela de Conclusão de Nível:</strong> Ao terminar uma fase (chegar até o guarda-chuva da
                        Jane), você verá a tela de pontuação. Lá, pressione o botão <strong>Quadrado (Square)</strong>
                        para salvar seu progresso.</li>
                    <li><strong>Load:</strong> Para continuar, selecione "Load Game" no menu principal e Jane guiará
                        você até seus arquivos salvos.</li>
                </ul>
                </p>

                <h2>Curiosidades da Selva</h2>
                <ul>
                    <li><strong>Vozes Originais:</strong> O jogo utiliza talentos de voz do filme original, mantendo a
                        autenticidade da experiência cinematográfica.</li>
                    <li><strong>Segredos do 100%:</strong> Se você coletar todas as letras <strong>T-A-R-Z-A-N</strong>
                        em todas as fases e completar 100% do jogo, você desbloqueia um vídeo especial da Disney.</li>
                    <li><strong>Níveis de Bônus:</strong> Para acessar as fases de bônus (como a corrida da cegonha),
                        você precisa encontrar as 4 partes de um <strong>esboço (sketch)</strong> escondidas em cada
                        nível.</li>
                    <li><strong>Armas Frutíferas:</strong> O Tarzan não usa apenas a faca. Existem frutas coloridas com
                        poderes diferentes: a <strong>Fruta Azul</strong> é a mais rara e poderosa, funcionando como uma
                        "bomba" que limpa a tela de inimigos.</li>
                </ul>
