                <h3>Crash Team Racing (CTR) <br> PlayStation 1</h3>
                <p><strong>Desenvolvedora:</strong> Naughty Dog <br>
                    <strong>Editora:</strong> Sony Computer Entertainment <br>
                    <strong>Lançamento:</strong> 1999 <br>
                    <strong>Gênero:</strong> Corrida de Kart <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer (1-4) <br>
                </p>
                <div class="game-description">
                    <p>A resposta definitiva da Sony ao Mario Kart. Desenvolvido pela lendária Naughty Dog, foi a
                        despedida do estúdio
                        à franquia Crash no PS1. Com gráficos que levavam o console ao limite e uma jogabilidade técnica
                        refinada,
                        ele conquistou uma legião de fãs que juram, até hoje, que sua mecânica de turbo é insuperável.
                    </p>

                    <h4>📜 A História</h4>
                    <p>O alienígena egocêntrico <strong>Nitros Oxide</strong> viaja pela galáxia procurando pilotos
                        dignos de desafio.
                        Ele chega à Terra com um ultimato: se vencer o melhor piloto do planeta, transformará o mundo em
                        um estacionamento
                        de concreto gigante. Crash, Cortex e outros rivais precisam fazer uma trégua para decidir quem
                        enfrentará o invasor.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Power Slide (O Pulo do Gato):</strong> A alma do jogo. Diferente de outros karts,
                            aqui o <em>drift</em>
                            é ativo. Você deve derrapar e apertar o botão oposto no momento exato em que a fumaça do
                            escapamento fica preta
                            para ganhar até 3 turbos consecutivos (o famoso "Drift Boosting").</li>
                        <li><strong>Modo Aventura:</strong> Inovador para a época, trouxe um mundo aberto (Hub World)
                            onde você dirige
                            livremente para acessar as pistas, enfrenta chefes em duelos 1x1 (como <em>Ripper Roo</em> e
                            <em>Pinstripe</em>)
                            e coleta chaves.</li>
                        <li><strong>Mecânica das Wumpas:</strong> Coletar 10 frutas Wumpa durante a corrida não serve
                            apenas para acelerar;
                            elas "anabolizam" seus itens (ex: o TNT vira Nitro que explode instantaneamente, e o míssil
                            ganha melhor rastreamento).</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O desafio CTR (coletar as letras C-T-R escondidas na pista e vencer a corrida) e as Corridas de
                        Relíquia (quebrar
                        caixas para parar o tempo) garantem horas de jogo. Mas o verdadeiro prestígio está em bater os
                        tempos dos fantasmas
                        de <strong>N. Tropy</strong> e <strong>Oxide</strong> no Time Trial, o que exige atalhos insanos
                        e domínio total do turbo.
                    </p>
                </div>
