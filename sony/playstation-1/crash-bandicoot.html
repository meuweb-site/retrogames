                <h3>Crash Bandicoot <br> PlayStation 1</h3>
                <p><strong>Desenvolvedora:</strong> Naughty Dog <br>
                    <strong>Editora:</strong> Sony Computer Entertainment <br>
                    <strong>Lançamento:</strong> 1996 <br>
                    <strong>Gênero:</strong> Plataforma 3D <br>
                    <strong>Modos de Jogo:</strong> Single-player <br>
                </p>
                <div class="game-description">
                    <p>O jogo que definiu uma geração. Em uma época onde todos tentavam fazer mundos 3D abertos (como
                        Mario 64), a Naughty Dog
                        apostou no "3D de corredor", criando gráficos incrivelmente detalhados e uma jogabilidade focada
                        e desafiadora.
                        Foi o mascote que provou que o PlayStation veio para ficar.
                    </p>

                    <h4>📜 A História</h4>
                    <p>A trama é simples e charmosa: o cientista louco <strong>Dr. Neo Cortex</strong> quer criar um
                        exército de animais mutantes
                        para dominar o mundo. Crash, sua criação rejeitada, foge do castelo e precisa voltar
                        atravessando três ilhas perigosas
                        para salvar sua namorada, Tawna, e impedir os planos do vilão.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>O Giro (Spin Attack):</strong> A mecânica assinatura de Crash. Em vez de pular na
                            cabeça (embora ele possa),
                            seu ataque principal é girar como um tornado para isolar inimigos e caixas para longe.</li>
                        <li><strong>Fases de Perseguição:</strong> Quem não se lembra do pânico de correr *em direção à
                            tela* fugindo de uma
                            pedra gigante (estilo Indiana Jones)? Esses níveis se tornaram ícones da franquia.</li>
                        <li><strong>Aku Aku:</strong> A máscara flutuante que protege Crash ("OODIBIGAH!"). Pegar três
                            delas dava uma invencibilidade
                            temporária acompanhada de uma música tribal inesquecível.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>Apesar de parecer simples, é um jogo brutal para completistas. Para ganhar uma
                        <strong>Gema</strong>, você precisa quebrar
                        TODAS as caixas da fase sem morrer nenhuma vez (no jogo original). As Fases Bônus de Tawna e
                        Brio também exigiam
                        precisão cirúrgica para garantir vidas extras e completar a porcentagem.
                    </p>
                </div>
