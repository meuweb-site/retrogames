                <h3>Twisted Metal: Small Brawl <br> PlayStation 1</h3>
                <p><strong>Desenvolvedora:</strong> Incognito Entertainment <br>
                    <strong>Editora:</strong> Sony Computer Entertainment <br>
                    <strong>Lançamento:</strong> 2001 <br>
                    <strong>Gênero:</strong> Combate Veicular <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer (1-2) <br>
                </p>
                <div class="game-description">
                    <p>Uma versão criativa e hilária da franquia. Lançado no final da vida do PS1, este título
                        transformou o caos sombrio da série em uma guerra de <strong>carrinhos de controle remoto
                            (RC)</strong>.
                        Lutar embaixo da mesa da cozinha ou fugir de cortadores de grama no quintal trouxe um charme
                        único estilo "Toy Story violento" para os combates.
                    </p>

                    <h4>📜 A História</h4>
                    <p>Esqueça o Calypso demoníaco. Aqui, ele é <strong>Billy Calypso</strong>, um garoto pestinha da
                        vizinhança que organiza um torneio de carrinhos RC para os valentões e desajustados do bairro.
                        O prêmio? O vencedor terá um desejo realizado pelo próprio Billy (que, claro, sempre distorce o
                        pedido final de forma irônica).</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Arenas Gigantes:</strong> O charme está na escala. Você batalha em locais do
                            cotidiano que parecem enormes, como uma <em>Casa na Árvore</em>, uma <em>Pista de
                                Boliche</em>, um <em>Cinema</em> e a clássica <em>Cozinha</em>.</li>
                        <li><strong>Física de RC:</strong> Os carros são mais rápidos e "saltitantes" que nos jogos
                            anteriores (como TM2 ou Black), simulando perfeitamente a física leve de brinquedos de
                            plástico.</li>
                        <li><strong>Armas Temáticas:</strong> Tudo foi adaptado para o mundo infantil: os mísseis são
                            fogos de artifício, as bombas são bombinhas de festa e os perigos ambientais incluem
                            aspiradores de pó e cachorros gigantes.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>Embora tenha uma física mais arcade, o jogo brilha no desbloqueio de personagens secretos (como
                        <em>Darkside</em> e <em>Axel</em>) e no modo <strong>Endurance</strong>,
                        onde você deve sobreviver a ondas infinitas de inimigos. O multiplayer é diversão garantida e
                        descomplicada.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
