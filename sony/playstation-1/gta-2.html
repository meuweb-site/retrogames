                <h3>Grand Theft Auto 2 <br> PlayStation 1 </h3>
                <p><strong>Desenvolvedora:</strong> DMA Design (Rockstar North) <br>
                    <strong>Editora:</strong> Rockstar Games <br>
                    <strong>Lançamento:</strong> 1999 <br>
                    <strong>Gênero:</strong> Ação / Mundo Aberto <br>
                    <strong>Modos de Jogo:</strong> Single-player <br>
                </p>
                <div class="game-description">
                    <p>O último grande suspiro da perspectiva clássica "top-down" (visão aérea) antes da franquia migrar
                        para o 3D.
                        Ambientado em uma metrópole retro-futurista chamada "Anywhere City", GTA 2 trouxe uma
                        jogabilidade mais refinada,
                        gráficos 2.5D mais detalhados e um sistema de iluminação dinâmica (anoitecer/amanhecer) que dava
                        um tom
                        sombrio e caótico ao jogo.
                    </p>

                    <h4>📜 A História</h4>
                    <p>Você é <strong>Claude Speed</strong>, um criminoso que acaba de sair da prisão criogênica. Sem
                        lealdade a ninguém,
                        seu objetivo é simples: dominar o submundo do crime jogando as gangues umas contra as outras.
                        Você deve acumular
                        dinheiro suficiente para comprar sua passagem para os próximos distritos, ascendendo na cadeia
                        alimentar do crime.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Sistema de Respeito:</strong> A grande inovação. Existem 7 gangues no jogo (como a
                            corporativa <em>Zaibatsu</em>,
                            os anarquistas <em>Loonies</em> e a <em>Yakuza</em>). Completar missões para uma gangue
                            aumenta seu respeito com ela,
                            mas faz as gangues rivais te atacarem à vista na rua.</li>
                        <li><strong>Jesus Saves:</strong> O único lugar seguro em uma cidade de loucos. Para salvar o
                            jogo, você precisava encontrar
                            a igreja com o letreiro neon "Jesus Saves" e pagar a "doação" de $50.000, o que tornava cada
                            save uma decisão estratégica.</li>
                        <li><strong>Veículos e Armas:</strong> Introduziu armas icônicas como o Lança-Chamas e a
                            ElectroGun, além da possibilidade
                            de equipar carros com metralhadoras, óleo na pista e minas explosivas.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>A liberdade é total. Além das missões principais (telefones tocando), o jogo está cheio de
                        colecionáveis (GTA 2 Tokens),
                        desafios de "Kill Frenzy" e áreas secretas para explorar nos três grandes mapas (Downtown,
                        Residential e Industrial).
                        Tentar manter o respeito máximo com todas as gangues ao mesmo tempo é um desafio para poucos.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
