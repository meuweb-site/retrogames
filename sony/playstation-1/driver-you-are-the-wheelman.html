                <h2>🏎️ Driver: You Are the Wheelman (PS1)</h2>
                <p>
                    Antes de GTA ser em 3D, existia um herói chamado <strong>Tanner</strong>. Ele é um detetive
                    infiltrado que dirige como se tivesse o diabo no corpo e uma suspensão feita de gelatina.
                    Prepare-se para perseguir bandidos, fugir de viaturas que surgem do éter e, claro, bater em muitos
                    cones de trânsito em Miami, San Francisco, Los Angeles e New York.
                </p>

                <h3>🤔 Por que este clássico?</h3>
                <p>
                    Porque é o simulador definitivo de "perseguição de filme dos anos 70". A física do carro faz você
                    sentir cada curva, e a trilha sonora de <em>funk/jazz</em> é simplesmente impecável.
                    Além disso, se você passar do tutorial na garagem, você já é um vencedor na vida.
                </p>

                <br>

                <h2>💾 Como Salvar</h2>
                <p>
                    Como estamos emulando, você tem o poder dos deuses: use o <strong>Save State</strong> do menu do
                    emulador para salvar a qualquer momento.
                    Mas, se quiser a experiência raiz, você precisa terminar as missões para o jogo pedir para acessar o
                    seu "Memory Card" virtual.
                </p>

                <br>

                <h2>💡 Curiosidades de Garagem</h2>
                <ul>
                    <li><strong>O Terror da Garagem:</strong> A primeira missão (o tutorial) é considerada um dos
                        "filtros" mais difíceis da história dos games. Muita gente devolveu o jogo na locadora porque
                        não conseguia fazer um <em>Slalom</em> ou um <em>360°</em> em 60 segundos.</li>
                    <li><strong>Cadê o Tanner?</strong> No primeiro jogo, você nunca sai do carro. Tanner é tecnicamente
                        parte do banco do motorista. Se o carro explodir, ele explode junto.</li>
                    <li><strong>Cidades Fantasmas:</strong> Para economizar memória no PS1, as cidades não têm pedestres
                        nas calçadas (ou eles correm como o Flash). É um mundo de carros e pânico!</li>
                </ul>

                <h3 style="color: #e74c3c;">⚠️ Cuidado com a calota voando e divirta-se!</h3>
            </div>
