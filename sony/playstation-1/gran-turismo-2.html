                <h3>Gran Turismo 2 <br> PlayStation 1</h3>
                <p><strong>Desenvolvedora:</strong> Polyphony Digital <br>
                    <strong>Editora:</strong> Sony Computer Entertainment <br>
                    <strong>Lançamento:</strong> 1999 <br>
                    <strong>Gênero:</strong> Simulador de Corrida <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer (1-2) <br>
                </p>
                <div class="game-description">
                    <p>O "Real Driving Simulator" definitivo do PS1. Se o primeiro jogo definiu o gênero, este o
                        expandiu ao infinito.
                        Com dois discos separados (Arcade e Simulação), GT2 empurrou o hardware do console ao limite
                        absoluto, trazendo uma quantidade
                        obscena de carros e uma física que ensinou uma geração inteira sobre tração, suspensão e a
                        diferença entre FF, FR e 4WD.
                    </p>

                    <h4>📜 O Modo GT (Carreira)</h4>
                    <p>A jornada clássica: você começa com meros <strong>10.000 créditos</strong>. Não dá para comprar
                        uma Ferrari;
                        você vai para a loja de usados comprar um Honda Civic, um Toyota Supra antigo ou um Mazda Miata.
                        O objetivo é
                        vencer corridas de domingo, tirar as infames <strong>Carteiras (Licenses)</strong> e transformar
                        sua lata velha
                        em uma máquina de corrida de 1000 cavalos.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Garagem Gigantesca:</strong> O jogo possui cerca de <strong>650 carros</strong>.
                            Diferente do primeiro,
                            que foca em japoneses, GT2 trouxe marcas mundiais como Ford, Chevrolet, Lotus e Mercedes,
                            incluindo clássicos históricos e muscle cars.</li>
                        <li><strong>Suzuki Escudo Pikes Peak:</strong> O carro mais lendário (e "quebrado") do jogo. Com
                            dois motores e aerofólios gigantes,
                            ele alcançava velocidades absurdas e permitia vencer qualquer coisa (até empinando o nariz),
                            tornando-se o sonho de consumo de todo jogador.</li>
                        <li><strong>Modo Rally:</strong> Pela primeira vez, o jogo introduziu pistas de terra, exigindo
                            uma pilotagem completamente
                            diferente e pneus específicos para derrapagem na lama.</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>GT2 é quase infinito. O desafio de obter <strong>Ouro</strong> em todas as licenças
                        (especialmente a Super License) é
                        um teste de paciência e habilidade técnica. Além disso, as corridas de
                        <strong>Endurance</strong> (de até 2 horas reais)
                        e a busca pelo 100% (que curiosamente travava em 98,2% em algumas versões devido a um bug)
                        garantiam meses de jogatina.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
