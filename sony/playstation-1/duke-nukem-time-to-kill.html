                <h3>Duke Nukem: Time to Kill <br> PlayStation 1</h3>
                <p><strong>Desenvolvedora:</strong> n-Space <br>
                    <strong>Editora:</strong> GT Interactive / 3D Realms <br>
                    <strong>Lançamento:</strong> 1998 <br>
                    <strong>Gênero:</strong> Tiro em 3ª Pessoa (TPS) / Ação <br>
                    <strong>Modos de Jogo:</strong> Single-player, Multiplayer (1-2) <br>
                </p>
                <div class="game-description">
                    <p>A estreia exclusiva de Duke no gênero de terceira pessoa. Muitas vezes descrito como "Tomb Raider
                        para machos",
                        o jogo trocou a visão em primeira pessoa por uma câmera nas costas, permitindo mais exploração,
                        saltos precisos
                        e ver o próprio Duke interagindo com o cenário. Manteve todo o humor adulto, a violência
                        exagerada e as referências
                        pop que consagraram a franquia.
                    </p>

                    <h4>📜 A História</h4>
                    <p>Os alienígenas estão tentando mudar a história para garantir que a raça humana seja escravizada
                        antes mesmo de
                        Duke nascer. Para impedi-los, Duke deve viajar no tempo, perseguindo os invasores através do
                        <strong>Velho Oeste</strong>,
                        da <strong>Roma Antiga</strong> e da <strong>Europa Medieval</strong>, limpando a linha do tempo
                        na base da bala.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Visual Temático:</strong> O charme da viagem no tempo é ver o Duke vestindo roupas
                            de acordo com a época.
                            Vê-lo de kilt escocês, toga romana ou roupa de cowboy enquanto segura uma bazuca é
                            impagável.</li>
                        <li><strong>Arsenal Adaptado:</strong> As armas clássicas ganharam versões de época. A Shotgun
                            vira uma espingarda
                            de cano serrado no Velho Oeste, a Pipe Bomb vira a "Granada Santa de Mão" (referência a
                            Monty Python) na era medieval,
                            além das armas de energia futuristas dos aliens.</li>
                        <li><strong>Exploração:</strong> Diferente dos jogos anteriores de "correr e atirar", aqui há
                            muitos quebra-cabeças
                            de ambiente, chaves para encontrar e áreas secretas escondidas (geralmente com strippers ou
                            itens de invencibilidade).</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O modo <strong>Deathmatch</strong> (Multiplayer) com tela dividida para dois jogadores era
                        viciante, permitindo duelos
                        nos mapas da campanha. Além disso, encontrar todos os segredos do jogo liberava versões
                        aprimoradas das armas
                        (como a Super Eagle) e munição infinita para uma segunda jogatina caótica.
                    </p>
                </div>

                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções

                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
