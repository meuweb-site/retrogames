                <h3>Jackie Chan Stuntmaster <br> PlayStation 1</h3>
                <p><strong>Desenvolvedora:</strong> Radical Entertainment <br>
                    <strong>Editora:</strong> Midway <br>
                    <strong>Lançamento:</strong> 2000 <br>
                    <strong>Gênero:</strong> Beat 'em up / Plataforma 3D <br>
                    <strong>Modos de Jogo:</strong> Single-player <br>
                </p>
                <div class="game-description">
                    <p>Provavelmente o jogo de luta mais carismático do PS1. A grande mágica aqui foi o uso de
                        <strong>Motion Capture</strong>:
                        o próprio Jackie Chan gravou todos os socos, chutes e as famosas reações de dor engraçadas,
                        dando ao personagem
                        uma autenticidade nunca vista antes. É como "jogar um filme" do Jackie, com todo o humor e
                        coreografias acrobáticas.
                    </p>

                    <h4>📜 A História</h4>
                    <p>A trama é clássica dos filmes de Kung-Fu: o avô de Jackie, Frederick, foi sequestrado por uma
                        gangue de bandidos
                        liderada pelo vilão Dante. Jackie deve atravessar as ruas perigosas de Nova York, passando por
                        becos, telhados,
                        fábricas e metrôs para resgatá-lo antes que seja tarde demais.</p>

                    <h4>🎮 Destaques e Jogabilidade</h4>
                    <ul>
                        <li><strong>Tudo é uma Arma:</strong> Fiel ao estilo do ator, você não usa armas de fogo. O
                            brilho está em pegar
                            vassouras, peixes, caixas, mesas e até rolos de pintura do cenário para bater nos inimigos.
                        </li>
                        <li><strong>Combate e Estilo:</strong> O sistema de combos é viciante (usando Quadrado e
                            Triângulo) e inclui os
                            famosos chutes na parede e cambalhotas para esquivar.</li>
                        <li><strong>Voz Original:</strong> O jogo conta com a dublagem do próprio Jackie Chan, que
                            comenta as fases,
                            provoca os inimigos e grita de dor quando leva dano ("Ouch!", "Sorry!").</li>
                    </ul>

                    <h4>✨ Fator Replay</h4>
                    <p>O verdadeiro desafio para os completistas são os <strong>Dragões Vermelhos</strong>. Existem 10
                        escondidos em cada fase
                        (muitos em lugares absurdamente difíceis de alcançar). Coletar todos libera fases bônus e, para
                        os mestres que pegam
                        os Dragões Dourados, o acesso à roupa secreta e ao Templo Shaolin.
                    </p>
                </div>
                <br>
                <h2>Como Salvar</h2>
                <p>Para salvar seu progresso neste jogo, você pode salvar o arquivo .save usando as opções
                    do emulador que está utilizando. Isso pode ser feito através do ícone 💾 no menu no canto inferior
                    esquerdo da tela.
                    Isso criará um arquivo de salvamento que você poderá carregar 📂 posteriormente
                    para continuar de onde parou.</p>
